
# 1. Configuración de Seguridad a nivel de Pod
podSecurityContext:
  runAsUser: null
  sysctls:
    - name: net.ipv4.ping_group_range
      value: "0 2147483647"

# 2. Configuración de Seguridad a nivel de Contenedor
securityContext:  
  runAsUser: null

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        method: GET
    icmp_ipv4:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: "ip4"